<div class="p-8 max-w-[400px] flex flex-col">
    <div class="flex justify-between">
        <div>
            <h2 class="text-xl font-medium mb-1">Sign In</h2>
            <p class="text-sm text-gray-500">Sign in to account to continye shopping</p>
        </div>
        <button tabindex="-1" matIconButton class="-my-2 -mr-2" mat-dialog-close>
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <form class="mb-6" [formGroup]="signInForm" (ngSubmit)="signIn()">
        <mat-form-field  class="w-fill mb-4">
            <input matInput formControlName="email" type="email" placeholder="Enter Your Email">
            <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field  class="w-fill mb-6">
            <input matInput formControlName="password" placeholder="Enter Yoyr Password" [type]="passwordVisible() ? 'text' : 'password'"  placeholder="Enter Your Email">
            <mat-icon matPrefix>lock</mat-icon>
            <button
                matSuffix
                matIconButton
                type="button"
                class="mr-2"
                (click)="passwordVisible.set(!passwordVisible())"
            >
                <mat-icon [fontIcon]="passwordVisible() ? 'visibility' : 'visibility_off'"></mat-icon>
            </button>
        </mat-form-field>
        <button type="submit" matButton="filled" class="w-full">Sign In</button>
    </form>

    <p class="text-sm text-gray-500 mt-2 text-center">Don't have an account?
        <a  class="text-blue-600 cursor-pointer" (click)="openSignUpDialog()">Sign Up</a>
    </p>
</div>
