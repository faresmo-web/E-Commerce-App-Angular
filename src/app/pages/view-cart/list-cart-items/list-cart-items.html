<div appViewPanel>
    <h2 class="text-2xl font-bold mb-4">Cart Items ({{store.cartCount()}})</h2>
    <div class="flex flex-col gap-6">
        @for (item of store.cartItems(); track item.product.id) {
            <div class="flex ">
                <app-show-cart-item [item]="item"/>
            </div>
        }
    </div>
</div>
