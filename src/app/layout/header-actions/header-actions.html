<div class="flex items-center gap-2">
    <button matIconButton routerLink="/Wishlist" [matBadge]="store.wishlistCount()" [matBadgeHidden]="store.wishlistCount() === 0">
        <mat-icon>favorite</mat-icon>
    </button>

    <button matIconButton [matBadge]="store.cartCount()" [matBadgeHidden]="store.cartCount() === 0" routerLink="/Cart">
        <mat-icon>shopping_cart</mat-icon>
    </button>


    @if (store.user(); as user){
        <button matIconButton  [matMenuTriggerFor]="appMenu">
            <img [src]="user.imageUrl" [alt]="user.name" class="w-8 h-8 rounded-full">
        </button>

        <mat-menu #appMenu xPosition="before">
            <div class="flex flex-col px-3 min-w-[200px]">
                <span class="text-sm font-medium">{{user.name}}</span>
                <span class="text-xs text-gray-500">{{user.email}}</span>
            </div>
            <mat-divider></mat-divider>
            <button class="!min-h-[32px]" mat-menu-item (click)="store.signOut()">
                <mat-icon>logout</mat-icon>
                Sign Out
            </button>
        </mat-menu>
    } @else {
        <button matButton (click)="store.proceedToCheckout()">
            Sign In
        </button>
        <button matButton="filled" (click)="openSignUpDialog()">
            Sign Up
        </button>
    }

</div>
